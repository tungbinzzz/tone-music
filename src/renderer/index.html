<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToneLink Assistant</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>ToneLink Assistant</h1>
        <p id="youtubeStatus">YouTube sẽ mở ở cửa sổ riêng</p>
      </div>
      <div class="actions">
        <button id="toggleSettings" class="icon-button secondary" title="Cài đặt" aria-label="Cài đặt">⚙</button>
        <button id="openCubase">Mở Cubase</button>
      </div>
    </header>

    <section class="grid">
      <article class="panel status-panel">
        <div class="panel-title">
          <h2>Tone chính</h2>
          <span id="engineStatus" class="badge">Đang chờ</span>
        </div>
        <div class="tone-readout">
          <div>
            <span class="label">Tone chính</span>
            <strong id="currentKey">--</strong>
          </div>
          <div>
            <span class="label">Độ tin cậy</span>
            <strong id="confidence">0%</strong>
          </div>
        </div>
        <div class="meter">
          <div id="confidenceBar"></div>
        </div>
        <div class="tone-meta">
          <span id="analysisLatency">Analysis: -- ms</span>
          <span id="analysisWindow">Window: -- s</span>
          <span id="instantKey">Instant: --</span>
          <span id="uiHeartbeat">UI: --</span>
        </div>
        <div class="row">
          <button id="startAnalyze">Bắt đầu dò tone</button>
          <button id="sendKeyCubase" class="secondary">Gửi Key/Scale</button>
          <button id="stopAnalyze" class="secondary">Dừng</button>
        </div>
        <label class="inline-check">
          <input id="autoSendKey" type="checkbox" />
          Tự gửi Key/Scale sang Cubase
        </label>
      </article>

      <article id="midiPanel" class="panel settings-panel is-hidden">
        <div class="panel-title">
          <h2>MIDI</h2>
          <span id="midiStatus" class="badge">MIDI</span>
        </div>
        <label>
          MIDI output
          <select id="midiOutput"></select>
        </label>
        <label>
          MIDI feedback input
          <select id="midiInput"></select>
        </label>
        <div class="midi-actions">
          <button id="refreshMidi" class="secondary">Làm mới MIDI</button>
          <button id="testMidi" class="secondary">Test CC23</button>
          <button id="exportPreset" class="secondary">Luu preset</button>
          <button id="importPreset" class="secondary">Nhap preset</button>
        </div>
      </article>

      <article class="panel wide">
        <div class="panel-title">
          <h2>Điều khiển</h2>
          <span class="badge">Live</span>
        </div>
        <div class="control-buttons">
          <button data-script-button data-midi-channel="0" data-midi-cc="40">Tắt/Bật Beat</button>
          <button data-script-button data-midi-channel="0" data-midi-cc="41">Tắt/Bật Mic</button>
          <button data-script-button data-midi-channel="0" data-midi-cc="42" data-midi-first-value="0">Tắt/Bật
            Vang</button>
        </div>
        <div class="control-grid">
          <label><span class="control-label"><span class="control-icon">♪</span>Volume Beat</span><span class="slider-line"><input data-script-slider data-midi-channel="0" data-midi-cc="50"
                data-control-name="Volume Beat" type="range" min="0" max="127"
                value="90" /><strong>90</strong></span></label>
          <label><span class="control-label"><span class="control-icon">●</span>Volume Mic</span><span class="slider-line"><input data-script-slider data-midi-channel="0" data-midi-cc="51"
                data-control-name="Volume Mic" type="range" min="0" max="127"
                value="90" /><strong>90</strong></span></label>
          <label><span class="control-label"><span class="control-icon">≋</span>Volume Vang</span><span class="slider-line"><input data-script-slider data-midi-channel="0" data-midi-cc="52"
                data-control-name="Volume Vang" type="range" min="0" max="127"
                value="55" /><strong>55</strong></span></label>
          <label><span class="control-label"><span class="control-icon">⇅</span>Volume Vang Ngắn</span><span class="slider-line"><input data-script-slider data-midi-channel="0"
                data-midi-cc="53" data-control-name="Volume Vang Ngan" type="range" min="0" max="127"
                value="45" /><strong>45</strong></span></label>
          <label><span class="control-label"><span class="control-icon">⌁</span>Delay</span><span class="slider-line"><input data-script-slider data-midi-channel="0" data-midi-cc="54"
                data-control-name="Delay" type="range" min="0" max="127" value="35" /><strong>35</strong></span></label>
        </div>
        <div class="control-buttons">
          <button data-script-button data-midi-channel="0" data-midi-cc="27">Bật Tune</button>
          <button data-script-button data-midi-channel="0" data-midi-cc="25">Bật Lofi</button>
          <button data-script-button data-midi-channel="0" data-midi-cc="22">Bật Remix</button>
        </div>
      </article>

      <article id="settingsPanel" class="panel wide settings-panel is-hidden">
        <div class="panel-title">
          <h2>Cấu hình</h2>
          <span class="badge">Windows</span>
        </div>
        <div class="settings-grid">
          <label>
            YouTube URL
            <input id="youtubeUrl" type="url" placeholder="https://www.youtube.com" />
          </label>
          <label>
            Python
            <input id="pythonPath" type="text" placeholder="python" />
          </label>
          <label class="path-field">
            Cubase executable
            <span>
              <input id="cubasePath" type="text" placeholder="C:\\Program Files\\Steinberg\\Cubase...\\Cubase.exe" />
              <button id="pickCubase" class="secondary">Chọn</button>
            </span>
          </label>
          <label class="checkline">
            <input id="autoYoutube" type="checkbox" />
            Tự mở YouTube khi bật app
          </label>
          <label class="checkline">
            <input id="autoCubase" type="checkbox" />
            Tự mở Cubase chạy nền khi bật app
          </label>
        </div>
        <button id="saveConfig">Lưu cấu hình</button>
      </article>

      <article class="panel wide">
        <div class="panel-title">
          <h2>Log</h2>
          <button id="clearLog" class="secondary">Xóa</button>
        </div>
        <pre id="log"></pre>
      </article>
    </section>
  </main>
  <script src="./renderer.js"></script>
</body>

</html>
